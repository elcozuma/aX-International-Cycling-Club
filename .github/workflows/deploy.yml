name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: |
          cd "$GITHUB_WORKSPACE/artifacts/axcc"
          echo "Building from: $(pwd)"
          pnpm run build
        env:
          NODE_ENV: production
          PORT: "3000"
          BASE_PATH: /${{ github.event.repository.name }}/

      - name: Inject build marker into index.html
        run: |
          MARKER="<!-- deployed: ${{ github.sha }} $(date -u '+%Y-%m-%dT%H:%M:%SZ') -->"
          sed -i "s|<!doctype html>|<!doctype html>\n${MARKER}|I" artifacts/axcc/dist/public/index.html
          echo "First 5 lines of built index.html:"
          head -5 artifacts/axcc/dist/public/index.html

      - name: Add .nojekyll
        run: touch artifacts/axcc/dist/public/.nojekyll

      - name: Verify build output
        run: |
          echo "=== Upload path contents ==="
          ls -la artifacts/axcc/dist/public/
          echo "=== JS bundles ==="
          ls -lh artifacts/axcc/dist/public/assets/*.js
          echo "=== Checking Nav panel style in bundle ==="
          grep -l "tracking-widest" artifacts/axcc/dist/public/assets/*.js && echo "Nav panel style FOUND" || echo "WARNING: not found"
          echo "=== Checking logo positioning in bundle ==="
          grep -l "left-1/2" artifacts/axcc/dist/public/assets/*.js && echo "Logo classes FOUND" || echo "WARNING: not found"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/axcc/dist/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
