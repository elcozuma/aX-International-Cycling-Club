name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Debug — pre-build
        run: |
          echo "=== GITHUB_WORKSPACE ==="
          echo "$GITHUB_WORKSPACE"
          echo "=== pwd ==="
          pwd
          echo "=== ls -la ==="
          ls -la
          echo "=== ls -la artifacts/axcc ==="
          ls -la artifacts/axcc
          echo "=== PORT ==="
          echo "$PORT"
        env:
          PORT: "3000"

      - name: Build
        run: |
          cd "$GITHUB_WORKSPACE/artifacts/axcc"
          echo "Building from: $(pwd)"
          pnpm run build
        env:
          NODE_ENV: production
          PORT: "3000"
          BASE_PATH: /${{ github.event.repository.name }}/

      - name: Debug — post-build output
        run: |
          echo "=== artifacts/axcc/dist ==="
          ls -la artifacts/axcc/dist || echo "dist not found"
          echo "=== artifacts/axcc/dist/public ==="
          ls -la artifacts/axcc/dist/public || echo "dist/public not found"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/axcc/dist/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
